<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing English Practice Time</title>
  <meta name="description" content="Practice 2,000 simple marketing sentences with fill-in-the-blank answers and shuffle mode." />
  <meta property="og:title" content="Marketing English Practice Time" />
  <meta property="og:description" content="Practice 2,000 simple marketing sentences with fill-in-the-blank answers and shuffle mode." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://learnwithla.github.io/marketing-thesis-training/practice.html" />
  <meta property="og:image" content="https://learnwithla.github.io/marketing-thesis-training/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Marketing English Practice Time" />
  <meta name="twitter:description" content="Practice 2,000 simple marketing sentences with fill-in-the-blank answers and shuffle mode." />
  <meta name="twitter:image" content="https://learnwithla.github.io/marketing-thesis-training/og-image.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Go to homepage">
        <div class="logo">La</div>
        <div>
          <h1>Practice Time</h1>
          <p>Guess the missing marketing term.</p>
        </div>
      </a>
      <nav class="nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="vocab.html">Flip Cards</a>
        <a class="active" href="practice.html">Practice Time</a>
        <a href="casestudy.html">Case Study</a>
      </nav>
    </header>

    <main>
      <h2 class="page-title">2,000 Simple Practice Sentences</h2>
      <p class="page-subtitle">By default, sentences follow the original topic sections. Click <strong>Shuffle All</strong> to mix all sentences in the current filter.</p>

      <div class="toolbar">
        <div class="filters">
          <select id="practiceSection" aria-label="Filter by section"></select>
          <input id="practiceSearch" type="search" placeholder="Search terms, Vietnamese, definitions, or sentences..." aria-label="Search practice sentences" />
        </div>
        <span class="pill" id="practiceCount"></span>
      </div>

      <div class="study-wrap">
        <div class="progress"><div class="bar" id="practiceBar"></div></div>
        <div class="card-panel practice-card" id="practicePanel"></div>
        <p class="status-line" id="practiceStatus"></p>
        <div class="controls">
          <button class="btn secondary" id="practicePrev">Previous</button>
          <button class="btn" id="practiceReveal">Reveal Answer</button>
          <button class="btn secondary" id="practiceNext">Next</button>
          <button class="btn secondary" id="practiceShuffle">Shuffle All</button>
          <button class="btn secondary" id="practiceReset">Section Order</button>
        </div>
      </div>
    </main>
  </div>

  <script src="practice-data.js"></script>
  <script>
    const DATA = window.PRACTICE_DATA || [];
    const topics = [...new Map(DATA.map(x => [x.section, x.topic])).entries()].sort((a,b)=>a[0]-b[0]);
    const state = { index: 0, revealed: false, items: [...DATA], shuffled: false };
    const $ = (id) => document.getElementById(id);
    function escapeHTML(s) { return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
    function populateSectionSelect(select) {
      select.innerHTML = '<option value="all">All sections</option>' + topics.map(([num, topic]) => `<option value="${num}">Section ${num} — ${escapeHTML(topic)}</option>`).join('');
    }
    function currentFilteredList() {
      const sectionVal = $('practiceSection').value;
      const q = $('practiceSearch').value.trim().toLowerCase();
      return DATA.filter(item => {
        const sectionOK = sectionVal === 'all' || item.section === Number(sectionVal);
        const text = `${item.id} ${item.term} ${item.vi || ''} ${item.definition} ${item.sentence} ${item.topic}`.toLowerCase();
        return sectionOK && (!q || text.includes(q));
      });
    }
    function filterItems() {
      state.items = currentFilteredList();
      state.index = 0;
      state.revealed = false;
      state.shuffled = false;
      renderPractice();
    }
    function progressPct() { return state.items.length ? ((state.index + 1) / state.items.length) * 100 : 0; }
    function blankSentenceHTML(item, revealed) {
      const parts = item.blanked.split('[[BLANK]]');
      const blankClass = revealed ? 'blank revealed' : 'blank';
      const answer = revealed ? escapeHTML(item.blank_answer) : '________';
      return `${escapeHTML(parts[0] || '')}<span class="${blankClass}" id="activeBlank" title="Click to reveal answer">${answer}</span>${escapeHTML(parts.slice(1).join(''))}`;
    }
    function renderPractice() {
      const items = state.items;
      $('practiceCount').textContent = items.length ? `${state.index + 1} / ${items.length} sentences` : '0 sentences';
      $('practiceBar').style.width = progressPct() + '%';
      $('practiceStatus').textContent = state.shuffled ? 'Shuffle mode is on: sentences are mixed randomly.' : 'Section order is on: sentences follow the uploaded practice file by topic.';
      if (!items.length) { $('practicePanel').innerHTML = '<div class="empty">No practice sentences match this filter.</div>'; return; }
      const item = items[state.index];
      const clueText = state.revealed
        ? `<strong>${escapeHTML(item.term)}:</strong> ${escapeHTML(item.definition)}${item.vi ? ` <span class="vi-term" style="font-size: inherit; display:block; margin-top:8px;">${escapeHTML(item.vi)}</span>` : ''}`
        : `<strong>Clue:</strong> ${escapeHTML(item.definition)}`;
      $('practicePanel').innerHTML = `<div><div class="week-tag">${escapeHTML(item.id)} • Section ${item.section} — ${escapeHTML(item.topic)}</div><p class="sentence">${blankSentenceHTML(item, state.revealed)}</p><p class="practice-definition visible">${clueText}</p><p class="hint">Guess the term, then click the blank or press <span class="kbd">Space</span> to reveal the answer.</p></div>`;
      const blank = $('activeBlank');
      if (blank) blank.addEventListener('click', () => { state.revealed = !state.revealed; renderPractice(); });
      $('practiceReveal').textContent = state.revealed ? 'Hide Answer' : 'Reveal Answer';
    }
    function next() { if (!state.items.length) return; state.index = (state.index + 1) % state.items.length; state.revealed = false; renderPractice(); }
    function prev() { if (!state.items.length) return; state.index = (state.index - 1 + state.items.length) % state.items.length; state.revealed = false; renderPractice(); }
    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }
    function shuffleAll() {
      const base = currentFilteredList();
      state.items = shuffleArray(base);
      state.index = 0;
      state.revealed = false;
      state.shuffled = true;
      renderPractice();
    }
    function resetOrder() {
      state.items = currentFilteredList();
      state.index = 0;
      state.revealed = false;
      state.shuffled = false;
      renderPractice();
    }
    function toggleReveal() { if (!state.items.length) return; state.revealed = !state.revealed; renderPractice(); }
    populateSectionSelect($('practiceSection'));
    $('practiceSection').addEventListener('input', filterItems);
    $('practiceSearch').addEventListener('input', filterItems);
    $('practiceReveal').addEventListener('click', toggleReveal);
    $('practiceNext').addEventListener('click', next);
    $('practicePrev').addEventListener('click', prev);
    $('practiceShuffle').addEventListener('click', shuffleAll);
    $('practiceReset').addEventListener('click', resetOrder);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
      if (e.code === 'Space' && !['INPUT','SELECT'].includes(document.activeElement.tagName)) { e.preventDefault(); toggleReveal(); }
    });
    renderPractice();
  </script>
</body>
</html>
